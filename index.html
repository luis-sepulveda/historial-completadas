<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de completadas por técnico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0f14; --panel:#131a22; --panel2:#0f151c; --line:#22303c;
    --ink:#e7eef5; --muted:#8aa0b2; --teal:#2dd4bf; --amber:#fbbf24;
    --violet:#a78bfa; --rose:#fb7185;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
       font-family:Inter,system-ui,sans-serif;padding:22px 18px 60px}
  .wrap{max-width:1240px;margin:0 auto}
  h1{font-family:'Space Grotesk',sans-serif;font-size:23px;margin:0 0 4px;letter-spacing:-.4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .sub b{color:var(--ink);font-weight:500}

  .filtros{display:flex;flex-wrap:wrap;gap:22px;background:var(--panel);
           border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px}
  .grupo{display:flex;flex-direction:column;gap:7px}
  .grupo>label{font-size:10px;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .chip{background:var(--panel2);border:1px solid var(--line);color:var(--muted);
        padding:6px 13px;border-radius:999px;font-size:12.5px;cursor:pointer;
        font-family:inherit;transition:.15s}
  .chip:hover{color:var(--ink);border-color:#2f4152}
  .chip.on{background:var(--teal);border-color:var(--teal);color:#06231f;font-weight:600}
  .chip:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

  /* buscador de tecnico */
  .buscador{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
            padding:6px 13px;border-radius:999px;font-size:12.5px;font-family:inherit;
            min-width:230px;transition:.15s}
  .buscador::placeholder{color:var(--muted)}
  .buscador:focus{outline:none;border-color:var(--teal)}
  .buscador.activo{border-color:var(--teal);color:var(--teal)}
  #ftec-x{display:none}
  #ftec-x.ver{display:inline-block}

  /* selector de dia */
  .selector{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
            padding:6px 12px;border-radius:999px;font-size:12.5px;font-family:inherit;
            color-scheme:dark;cursor:pointer;transition:.15s}
  .selector:focus{outline:none;border-color:var(--teal)}
  .selector.activo{border-color:var(--teal);color:var(--teal);font-weight:600}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
  .kpi .n{font-family:'Space Grotesk',sans-serif;font-size:27px;font-weight:700;line-height:1.1}
  .kpi .l{font-size:11px;color:var(--muted);margin-top:3px}
  .kpi.t .n{color:var(--teal)} .kpi.a .n{color:var(--amber)}
  .kpi.v .n{color:var(--violet)} .kpi.r .n{color:var(--rose)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .card h2{font-family:'Space Grotesk',sans-serif;font-size:14px;margin:0;
           padding:13px 16px;border-bottom:1px solid var(--line);font-weight:500}
  .scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 11px;text-align:center;white-space:nowrap}
  th{background:var(--panel2);color:var(--muted);font-size:10px;letter-spacing:.7px;
     text-transform:uppercase;font-weight:600;position:sticky;top:0;cursor:pointer;user-select:none}
  th:hover{color:var(--ink)}
  th.izq,td.izq{text-align:left}
  tbody tr{border-top:1px solid var(--line);cursor:pointer}
  tbody tr:hover{background:#18212b}
  td.tec{font-weight:500}
  td.cero{color:#3d4d5c}
  td.tot{font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--teal)}
  .sup{font-size:10.5px;color:var(--muted);display:block;font-weight:400;margin-top:1px}
  tfoot td{border-top:2px solid var(--line);background:var(--panel2);font-weight:600}

  .vacio{padding:34px;text-align:center;color:var(--muted);font-size:13px}

  dialog{background:var(--panel);color:var(--ink);border:1px solid var(--line);
         border-radius:14px;padding:0;max-width:900px;width:94vw;max-height:82vh}
  dialog::backdrop{background:rgba(4,8,12,.72)}
  .dlg-h{display:flex;justify-content:space-between;align-items:center;gap:14px;
         padding:14px 17px;border-bottom:1px solid var(--line)}
  .dlg-h h3{font-family:'Space Grotesk',sans-serif;font-size:15px;margin:0;font-weight:500}
  .dlg-h button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);
                border-radius:8px;padding:5px 12px;cursor:pointer;font-family:inherit;font-size:12px}
  .dlg-h button:hover{color:var(--ink)}
  .dlg-b{overflow:auto;max-height:66vh}
  .dlg-b table{font-size:12.5px}
  .dlg-b td{white-space:normal}
  .ot{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--amber)}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;
        background:var(--panel2);border:1px solid var(--line)}
  .pill.gsa{border-color:var(--violet);color:var(--violet)}

  @media (max-width:640px){
    body{padding:14px 11px 50px} h1{font-size:19px}
    .filtros{gap:14px;padding:12px} th,td{padding:7px 8px;font-size:12px}
    .buscador{min-width:0;width:100%}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <h1>Historial de completadas por técnico</h1>
  <div class="sub">Técnicos DOMI · actualizado <b id="gen">—</b></div>

  <div class="filtros">
    <div class="grupo">
      <label>Supervisor</label>
      <div class="chips" id="fsup"></div>
    </div>
    <div class="grupo">
      <label>Período</label>
      <div class="chips" id="fper">
        <button class="chip" data-p="hoy">Hoy</button>
        <button class="chip" data-p="7">Últimos 7 días</button>
        <button class="chip" data-p="mes">Este mes</button>
        <button class="chip on" data-p="todo">Todo el histórico</button>
      </div>
    </div>
    <div class="grupo">
      <label>Día</label>
      <div class="chips">
        <select class="selector" id="fdia" aria-label="Día"></select>
      </div>
    </div>
    <div class="grupo">
      <label>Técnico</label>
      <div class="chips">
        <input class="buscador" id="ftec" list="ltec" autocomplete="off"
               placeholder="Escribe o elige un técnico">
        <datalist id="ltec"></datalist>
        <button class="chip" id="ftec-x">Limpiar</button>
      </div>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="card">
    <h2>Detalle por técnico — toca una fila para ver sus órdenes</h2>
    <div class="scroll"><table id="tabla"></table></div>
  </div>
</div>

<dialog id="dlg">
  <div class="dlg-h">
    <h3 id="dlg-t">—</h3>
    <button id="dlg-x">Cerrar</button>
  </div>
  <div class="dlg-b"><table id="dlg-tb"></table></div>
</dialog>

document.getElementById('gen').textContent = D.generado;

let supActivo = 'TODOS';
let perActivo = 'todo';
let tecFiltro = '';
let diaSel = '';

// ---------- filtros de supervisor ----------
const fsup = document.getElementById('fsup');
[['TODOS','Todos']].concat(D.supervisores.map(s=>[s,s])).forEach(([v,t],i)=>{
  const b=document.createElement('button');
  b.className='chip'+(i===0?' on':''); b.dataset.s=v; b.textContent=t;
  fsup.appendChild(b);
});

function activar(cont, attr, valor){
  cont.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on', c.dataset[attr]===valor));
}
fsup.addEventListener('click', e=>{
  const b=e.target.closest('.chip'); if(!b) return;
  supActivo=b.dataset.s; activar(fsup,'s',supActivo); refrescarLista(); refrescarDias(); pintar();
});
document.getElementById('fper').addEventListener('click', e=>{
  const b=e.target.closest('.chip'); if(!b) return;
  perActivo=b.dataset.p; activar(document.getElementById('fper'),'p',perActivo);
  diaSel=''; selDia.value=''; selDia.classList.remove('activo');  // el periodo anula el dia
  refrescarDias();
  pintar();
});

// ---------- selector de dia ----------
const selDia = document.getElementById('fdia');

function bonita(iso){
  const p = iso.split('-');
  return p[2]+'-'+p[1]+'-'+p[0];
}

// Solo ofrece dias que TIENEN completadas, con el conteo de ordenes
// segun el supervisor y el tecnico que tengas puestos.
function refrescarDias(){
  const base = D.ordenes.filter(o=>{
    if(supActivo!=='TODOS' && o.supervisor!==supActivo) return false;
    if(tecFiltro && !String(o.tecnico).toUpperCase().includes(tecFiltro)) return false;
    return !!o.fecha;
  });

  const conteo = {};
  base.forEach(o=>{ conteo[o.fecha] = (conteo[o.fecha]||0) + 1; });
  const dias = Object.keys(conteo).sort().reverse();   // el mas reciente arriba

  selDia.innerHTML =
    `<option value="">Todos los días (${base.length} OT)</option>` +
    dias.map(d=>`<option value="${d}">${bonita(d)} · ${conteo[d]} OT</option>`).join('');

  // si el dia elegido ya no existe con estos filtros, vuelvo a "todos"
  if(diaSel && !conteo[diaSel]){
    diaSel = '';
    perActivo = 'todo';
    activar(document.getElementById('fper'), 'p', 'todo');
  }
  selDia.value = diaSel;
  selDia.classList.toggle('activo', !!diaSel);
}

selDia.addEventListener('change', ()=>{
  diaSel = selDia.value;
  selDia.classList.toggle('activo', !!diaSel);
  if(diaSel){
    perActivo = 'dia';
    activar(document.getElementById('fper'), 'p', '');   // apaga los chips de periodo
  } else {
    perActivo = 'todo';
    activar(document.getElementById('fper'), 'p', 'todo');
  }
  pintar();
});

// ---------- filtro de tecnico ----------
const inpTec = document.getElementById('ftec');
const btnTecX = document.getElementById('ftec-x');

// Lista de sugerencias: solo los tecnicos del supervisor elegido
function refrescarLista(){
  const nombres = new Set(
    D.ordenes.filter(o => supActivo==='TODOS' || o.supervisor===supActivo)
             .map(o => o.tecnico)
  );
  document.getElementById('ltec').innerHTML =
    [...nombres].sort().map(t=>`<option value="${t}"></option>`).join('');
}

function aplicarTec(){
  tecFiltro = inpTec.value.trim().toUpperCase();
  inpTec.classList.toggle('activo', !!tecFiltro);
  btnTecX.classList.toggle('ver', !!tecFiltro);
  refrescarDias();
  pintar();
}
inpTec.addEventListener('input', aplicarTec);
btnTecX.addEventListener('click', ()=>{ inpTec.value=''; aplicarTec(); });

// ---------- filtrado ----------
function hoyISO(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function desdeISO(dias){
  const d=new Date(); d.setDate(d.getDate()-dias);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function filtradas(){
  const hoy=hoyISO();
  return D.ordenes.filter(o=>{
    if(supActivo!=='TODOS' && o.supervisor!==supActivo) return false;
    if(tecFiltro && !String(o.tecnico).toUpperCase().includes(tecFiltro)) return false;
    if(perActivo==='dia')  return o.fecha===diaSel;
    if(perActivo==='hoy')  return o.fecha===hoy;
    if(perActivo==='7')    return o.fecha>=desdeISO(6);
    if(perActivo==='mes')  return o.fecha.slice(0,7)===hoy.slice(0,7);
    return true;
  });
}

// ---------- tabla ----------
let ordenCol='TOTAL', ordenDesc=true;

function pintar(){
  const ords=filtradas();
  const cols=D.columnas;

  // agrupar por tecnico
  const porTec={};
  ords.forEach(o=>{
    if(!porTec[o.tecnico]) porTec[o.tecnico]={tec:o.tecnico,sup:o.supervisor,TOTAL:0,items:[]};
    const f=porTec[o.tecnico];
    f[o.categoria]=(f[o.categoria]||0)+1; f.TOTAL++; f.items.push(o);
  });
  let filas=Object.values(porTec);

  filas.sort((a,b)=>{
    if(ordenCol==='tec') return ordenDesc? b.tec.localeCompare(a.tec) : a.tec.localeCompare(b.tec);
    const x=(a[ordenCol]||0), y=(b[ordenCol]||0);
    return ordenDesc? y-x || a.tec.localeCompare(b.tec) : x-y || a.tec.localeCompare(b.tec);
  });

  // KPIs
  const rep=ords.filter(o=>o.categoria==='Reparación').length;
  const alt=ords.filter(o=>o.categoria.startsWith('Alta')).length;
  const mig=ords.filter(o=>o.categoria.startsWith('Migración')).length;
  document.getElementById('kpis').innerHTML =
    kpi('t',ords.length,'órdenes completadas')+
    kpi('a',rep,'reparaciones')+
    kpi('v',alt,'altas')+
    kpi('r',mig,'migraciones')+
    kpi('t',filas.length,'técnicos con trabajo');

  const tabla=document.getElementById('tabla');
  if(!filas.length){
    let msg = 'No hay órdenes registradas para este filtro. Prueba con otro período.';
    if(tecFiltro){
      msg = 'Ningún técnico coincide con «'+inpTec.value.trim()+'» en este período. Borra el nombre o cambia el filtro.';
    } else if(perActivo==='dia'){
      msg = 'No hay órdenes el '+bonita(diaSel)+' con estos filtros.';
    }
    tabla.innerHTML='<tbody><tr><td class="vacio">'+msg+'</td></tr></tbody>';
    return;
  }

  let h='<thead><tr><th class="izq" data-c="tec">Técnico</th>';
  cols.forEach(c=>h+=`<th data-c="${c}">${c}</th>`);
  h+='<th data-c="TOTAL">Total</th></tr></thead><tbody>';

  filas.forEach(f=>{
    h+=`<tr data-tec="${f.tec}"><td class="izq tec">${f.tec}<span class="sup">${f.sup}</span></td>`;
    cols.forEach(c=>{
      const n=f[c]||0;
      h+=`<td class="${n?'':'cero'}">${n||'·'}</td>`;
    });
    h+=`<td class="tot">${f.TOTAL}</td></tr>`;
  });

  // fila de totales
  h+='</tbody><tfoot><tr><td class="izq">TOTAL</td>';
  cols.forEach(c=>{
    const s=filas.reduce((a,f)=>a+(f[c]||0),0);
    h+=`<td class="${s?'':'cero'}">${s||'·'}</td>`;
  });
  h+=`<td class="tot">${ords.length}</td></tr></tfoot>`;
  tabla.innerHTML=h;

  tabla.querySelectorAll('th').forEach(th=>th.addEventListener('click',()=>{
    const c=th.dataset.c;
    if(ordenCol===c){ordenDesc=!ordenDesc;} else {ordenCol=c;ordenDesc=(c!=='tec');}
    pintar();
  }));
  tabla.querySelectorAll('tbody tr').forEach(tr=>tr.addEventListener('click',()=>{
    abrirDetalle(porTec[tr.dataset.tec]);
  }));
}

function kpi(cls,n,l){
  return `<div class="kpi ${cls}"><div class="n">${n}</div><div class="l">${l}</div></div>`;
}

// ---------- detalle ----------
const dlg=document.getElementById('dlg');
document.getElementById('dlg-x').addEventListener('click',()=>dlg.close());

function abrirDetalle(f){
  document.getElementById('dlg-t').textContent = f.tec+' · '+f.TOTAL+' órdenes · '+f.sup;
  const items=f.items.slice().sort((a,b)=> b.fecha.localeCompare(a.fecha));
  let h='<thead><tr><th class="izq">Fecha</th><th class="izq">OT</th><th class="izq">Categoría</th>'+
        '<th class="izq">Subtipo</th><th class="izq">Cierre</th><th class="izq">Ciudad</th></tr></thead><tbody>';
  items.forEach(o=>{
    const gsa = /aprovisionamiento/i.test(o.codigo_cierre||'');
    h+=`<tr><td class="izq">${o.fecha}</td><td class="izq ot">${o.ot}</td>`+
       `<td class="izq"><span class="pill">${o.categoria}</span></td>`+
       `<td class="izq">${o.subtipo||'—'}</td>`+
       `<td class="izq"><span class="pill${gsa?' gsa':''}">${o.codigo_cierre||'—'}</span></td>`+
       `<td class="izq">${o.ciudad||'—'}</td></tr>`;
  });
  document.getElementById('dlg-tb').innerHTML=h+'</tbody>';
  dlg.showModal();
}

refrescarLista();
refrescarDias();
pintar();
</script>
